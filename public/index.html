<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="utf-8">
  <title>JTC Visualization</title>
  <style> body { margin: 0; } </style>  
  <script src="script.js"></script>
</head>

<body>

<div class="label">
</div>
  <div id="3d-graph"></div>


  <script type="module">
    import ForceGraph3D from 'https://esm.sh/3d-force-graph';
    import SpriteText from "https://esm.sh/three-spritetext";
    import * as THREE from 'https://esm.sh/three';

const elem = document.getElementById('3d-graph')
const Graph = new ForceGraph3D(elem)
   .jsonUrl('../datasets/vis.json') 
   .linkDirectionalParticles(1)
   .linkDirectionalParticleWidth(0.4)
   .linkDirectionalParticleSpeed(0.002)
   .linkOpacity(0.1)
   .nodeLabel(node => {
   if (node.link) {
      return `${node.text = `Open`} ${node.shortname}${node.text = `'s profile using right click`}<br>${node.link}`
      Element.style.textAlign = "center";
   }
   return '';
   })
   .onNodeRightClick(node => {
      if (node.link) {
      window.open(node.link, '_blank', 'noopener,noreferrer');
      }
   })
   .nodeResolution([10])
   .onNodeClick(node => { // Aim at node from outside it
   const distance = 80;
   const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
   const newPos = node.x || node.y || node.z
      ? {x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio}
      : {x: 0, y: 0, z: distance}; // special case if node is in (0,0,0)

   Graph.cameraPosition(
      newPos, // new position
      node, // lookAt ({ x, y, z })
      3000  // ms transition duration
   );
   })
   .nodeAutoColorBy('group')
   .nodeThreeObjectExtend(node =>{
      return !(["bigstructureblu", "bigstructureorg", "bigstructureprl", "bigstructuretea", "disciplineblu", "disciplineorg", "disciplineprl", "disciplinetea", "hashtagblu", "hashtagorg", "hashtagprl", "hashtagtea", "lilstructureblu", "lilstructureorg", "lilstructureprl", "lilstructuretea"].includes(node.type));
   })

   .nodeThreeObject(node => {
      const textSprite = new SpriteText(node.label ?? node.id);

      if(node.type === "scholar"){
         const sprite = new SpriteText(node.id);
         sprite.material.depthWrite = true; // make sprite background transparent
         sprite.color = node.color;
         sprite.textHeight = 4;
         sprite.center.y = -1.2; // shift above node
         return sprite;
      }
      else if(node.type === "bigstructureblu"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node
         const imgTexture = new THREE.TextureLoader().load(`./imgs/bigstructureblu.png`);
         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(14, 14);
         textSprite.textHeight = 4 / 10; // needs refining
         sprite.add(textSprite);
         return sprite;
      }
       else if(node.type === "bigstructureorg"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node
         const imgTexture = new THREE.TextureLoader().load(`./imgs/bigstructureorg.png`);
         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(14, 14);
         textSprite.textHeight = 4 / 10; // needs refining
         sprite.add(textSprite);
         return sprite;
      }
      else if(node.type === "bigstructureprl"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node

         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(14, 14);
         textSprite.textHeight = 4 / 10; // needs refining
         sprite.add(textSprite);
         return sprite;
         
      }
      else if(node.type === "bigstructuretea"){
         textSprite.material.depthWrite = false; // make sprite background transparent

         textSprite.center.y = 2.2; // shift above node

         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(14, 14);
         textSprite.textHeight = 4 / 8; // needs refining
         sprite.add(textSprite);
         node.size = 0.1;
         
         return sprite;
      }
        else if(node.type === "disciplineblu"){

         const sprite = new THREE.Sprite(material);

         return sprite;
      }

      }
       else if(node.type === "hashtagtea"){

         return sprite;
      }
       else if(node.type === "lilstructureblu"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node

         imgTexture.colorSpace = THREE.SRGBColorSpace;

         return sprite;
      }
        else if(node.type === "lilstructureorg"){
         textSprite.material.depthWrite = false; // make sprite background transparent

      }
        else if(node.type === "lilstructureprl"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node
         const imgTexture = new THREE.TextureLoader().load(`./imgs/lilstructureprl.png`);
         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(16, 16);      
         textSprite.textHeight = 4 / 10; // needs refining

         return sprite;
      }
       else if(node.type === "lilstructuretea"){
         textSprite.material.depthWrite = false; // make sprite background transparent
         textSprite.color = node.color;
         textSprite.center.y = 2.2; // shift above node
         const imgTexture = new THREE.TextureLoader().load(`./imgs/lilstructuretea.png`);
         imgTexture.colorSpace = THREE.SRGBColorSpace;
         const material = new THREE.SpriteMaterial({map: imgTexture});
         const sprite = new THREE.Sprite(material);
         sprite.scale.set(16, 16);      
         textSprite.textHeight = 4 / 10; // needs refining
         sprite.add(textSprite);
         return sprite;
      }
      textSprite.textHeight = 4;
      return textSprite;
   })

Graph.d3Force('charge').strength(-300);

   </script>
