const elem = document.getElementById('3d-graph')
const Graph = new ForceGraph3D(elem)
      .jsonUrl('../datasets/vis.json') 
      .linkDirectionalParticles(1)
      .linkDirectionalParticleWidth(0.4)
      .linkDirectionalParticleSpeed(0.002)
      .linkOpacity(0.1)
    //.linkColor(link => link.color ? 'darkorange' : 'red' )
    //.nodeLabel(node => `${node.source}`)

    //.nodeLabel(node => `${node.typeid}: ${node.label}`)
    //.nodeLabel(node => `${node.user}: ${node.description}`)

      .onNodeClick(node => window.open(node.link))
      .nodeResolution([10])

      .onNodeClick(node => {
      // Aim at node from outside it
      const distance = 80;
      const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
      const newPos = node.x || node.y || node.z
         ? {x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio}
         : {x: 0, y: 0, z: distance}; // special case if node is in (0,0,0)

      Graph.cameraPosition(
         newPos, // new position
         node, // lookAt ({ x, y, z })
         3000  // ms transition duration
      );
   })
   .nodeAutoColorBy('group')
   .nodeThreeObjectExtend(node =>{
      return !(["bigstructureblu", "bigstructureorg", "bigstructureprl", "bigstructuretea", "disciplineblu", "disciplineorg", "disciplineprl", "disciplinetea", "hashtagblu", "hashtagorg", "hashtagprl", "hashtagtea", "lilstructureblu", "lilstructureorg", "lilstructureprl", "lilstructuretea"].includes(node.type));
   })
